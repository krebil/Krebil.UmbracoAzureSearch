name: Release to NuGet

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
    - name: Build
      run: dotnet build src/UmbracoAzureSearch/UmbracoAzureSearch.csproj -c Release
    # Integration tests require live Azure AI Search and Elasticsearch instances.
    # Run them locally before releasing.
    - name: Pack NuGet
      run: dotnet pack src/UmbracoAzureSearch/UmbracoAzureSearch.csproj -c Release --no-build --output .
    - name: Push to NuGet
      run: dotnet nuget push "*.nupkg" --skip-duplicate --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
